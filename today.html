<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Nunito+Sans:wght@400;600&display=swap');
  :root{--bg:#07090f;--card:#0f1520;--card2:#141d2e;--border:#1e2d45;--text:#eef4ff;--muted:#5a7a9a;--accent:#3b82f6;--green:#4ade80;--red:#f87171;--yellow:#fbbf24;--radius:18px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:17px;line-height:1.6;}
  .header{background:linear-gradient(160deg,#050810 0%,#0a1628 100%);padding:24px 20px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .header h1{font-family:'Nunito',sans-serif;font-size:1.5rem;font-weight:900;color:#fff;}
  .home-link{color:var(--muted);font-size:0.82rem;text-decoration:none;font-weight:700;border:1px solid var(--border);padding:5px 12px;border-radius:20px;}
  .home-link:hover{color:var(--text);border-color:var(--accent);}
  .date-str{font-size:0.85rem;color:var(--muted);}
  .progress-section{padding:16px 20px 0;}
  .progress-label{display:flex;justify-content:space-between;font-size:0.8rem;font-weight:700;color:var(--muted);margin-bottom:8px;}
  .progress-label span{color:var(--text);}
  .progress-track{height:10px;background:var(--card2);border-radius:10px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:10px;transition:width 0.5s ease;}
  .topics-section{padding:20px 16px 8px;}
  .section-label{font-family:'Nunito',sans-serif;font-size:0.72rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
  .topic-card{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;transition:all 0.2s;}
  .topic-card.done{border-color:var(--green);background:#4ade8008;}
  .topic-main{padding:16px 18px;display:flex;align-items:center;gap:14px;}
  .topic-check{width:36px;height:36px;border-radius:50%;border:2.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;cursor:pointer;transition:all 0.2s;background:var(--card2);}
  .topic-card.done .topic-check{border-color:var(--green);background:var(--green);}
  .topic-info{flex:1;}
  .topic-subject{font-size:0.7rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px;}
  .topic-name{font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;color:var(--text);}
  .topic-card.done .topic-name{color:var(--green);}
  .topic-exam{font-size:0.75rem;color:var(--muted);margin-top:2px;}
  .topic-go{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:10px 16px;font-family:'Nunito',sans-serif;font-weight:900;font-size:0.85rem;cursor:pointer;text-decoration:none;flex-shrink:0;transition:all 0.2s;}
  .topic-go:active{transform:scale(0.97);}
  .topic-card.done .topic-go{background:#4ade8030;color:var(--green);}
  .score-row{border-top:1px solid var(--border);padding:12px 18px;display:none;flex-direction:column;gap:10px;}
  .topic-card.done .score-row{display:flex;}
  .score-label{font-size:0.82rem;color:var(--muted);font-weight:700;flex-shrink:0;margin-bottom:2px;}
  .score-line{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .score-btns{display:flex;gap:6px;flex-wrap:wrap;}
  .score-btn{width:34px;height:34px;border-radius:50%;border:2px solid var(--border);background:var(--card2);color:var(--muted);font-family:'Nunito',sans-serif;font-weight:900;font-size:0.82rem;cursor:pointer;transition:all 0.15s;}
  .score-btn:hover{border-color:var(--accent);color:var(--text);}
  .score-btn.sel-total{background:var(--accent);border-color:var(--accent);color:#fff;}
  .score-btn.sel-good{background:var(--green);border-color:var(--green);color:#07090f;}
  .score-btn.sel-ok{background:var(--yellow);border-color:var(--yellow);color:#07090f;}
  .score-btn.sel-bad{background:var(--red);border-color:var(--red);color:#fff;}
  .share-section{padding:0 16px 16px;display:none;}
  .share-section.visible{display:block;}
  /* SCORECARD */
  .scorecard{background:linear-gradient(160deg,#0a1628 0%,#0d1f3a 100%);border:2px solid var(--green);border-radius:var(--radius);padding:22px 20px;margin-bottom:14px;}
  .scorecard-header{text-align:center;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid #ffffff15;}
  .scorecard-emoji{font-size:2.2rem;display:block;margin-bottom:6px;}
  .scorecard-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.3rem;color:#fff;margin-bottom:2px;}
  .scorecard-date{font-size:0.8rem;color:var(--muted);font-weight:600;}
  .scorecard-rows{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
  .scorecard-row{display:flex;align-items:center;gap:12px;background:#ffffff08;border-radius:12px;padding:12px 14px;}
  .sc-icon{font-size:1.2rem;flex-shrink:0;width:28px;text-align:center;}
  .sc-info{flex:1;}
  .sc-subject{font-family:'Nunito',sans-serif;font-weight:900;font-size:0.78rem;letter-spacing:1px;text-transform:uppercase;}
  .sc-topic{font-size:0.88rem;color:#c8d8ee;font-weight:600;margin-top:1px;}
  .sc-score{font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;flex-shrink:0;text-align:right;}
  .sc-score.great{color:var(--green);}
  .sc-score.ok{color:var(--yellow);}
  .sc-score.bad{color:var(--red);}
  .sc-score.none{color:var(--muted);}
  .scorecard-footer{text-align:center;padding-top:14px;border-top:1px solid #ffffff15;}
  .sc-total{font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;color:#fff;margin-bottom:4px;}
  .sc-brand{font-size:0.72rem;color:var(--muted);}
  .screenshot-hint{text-align:center;font-size:0.8rem;color:var(--muted);margin-bottom:12px;padding:8px 14px;background:var(--card);border-radius:10px;border:1px dashed var(--border);}
  .copy-btn{width:100%;padding:14px;background:var(--green);color:#07090f;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;cursor:pointer;}
  .copy-btn:active{transform:scale(0.98);}
  .copied-msg{text-align:center;color:var(--green);font-size:0.85rem;font-weight:700;margin-top:8px;display:none;}
  .rest-card{margin:20px 16px;background:var(--card);border:2px solid var(--border);border-radius:var(--radius);padding:30px 20px;text-align:center;}
  .rest-emoji{font-size:3rem;margin-bottom:12px;display:block;}
  .rest-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.3rem;color:var(--text);margin-bottom:8px;}
  .rest-msg{color:var(--muted);font-size:0.9rem;}
  .nav-row{display:flex;gap:10px;padding:8px 16px 40px;}
  .nav-btn{flex:1;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:14px;color:var(--muted);font-family:'Nunito',sans-serif;font-weight:800;font-size:0.85rem;cursor:pointer;text-align:center;}
  .nav-btn:hover{border-color:var(--accent);color:var(--text);}
  .nav-btn.today-btn{background:var(--accent);border-color:var(--accent);color:#fff;}
  .subj-RE{color:#c084fc;} .subj-Maths{color:#4ade80;} .subj-Geography{color:#38bdf8;} .subj-History{color:#f59e0b;} .subj-Science{color:#00d4aa;} .subj-English{color:#e879f9;}

</style>

const ICONS={RE:'🙏',Maths:'➕',Geography:'🌍',History:'⚔️',Science:'🔬',English:'✍️'};
const EXAM_LABELS={RE:'Mon 15 Jun',Maths:'Tue 16 Jun',Geography:'Wed 17 Jun',History:'Wed 17 Jun',Science:'Thu 18 Jun',English:'Thu 18 Jun'};

function getTodayStr(){return new Date().toISOString().split('T')[0];}
function loadState(d){try{const s=localStorage.getItem('bert_'+d);return s?JSON.parse(s):{}}catch(e){return {};}}
function saveState(d,s){try{localStorage.setItem('bert_'+d,JSON.stringify(s));}catch(e){}}

let viewingDate=getTodayStr(),state={};

function findDay(dt){return SCHEDULE.find(d=>d.date===dt)||null;}
function getPrev(dt){const i=SCHEDULE.findIndex(d=>d.date===dt);return i>0?SCHEDULE[i-1].date:null;}
function getNext(dt){const i=SCHEDULE.findIndex(d=>d.date===dt);return i>=0&&i<SCHEDULE.length-1?SCHEDULE[i+1].date:null;}

function buildShareText(day,state){
  const lines=[`📚 Bert's revision — ${day.date_str}\n`];
  day.topics.forEach((t,i)=>{
    const done=state[i]?.done;
    const correct=state[i]?.correct;
    const total=state[i]?.total;
    const emoji=done?'✅':'⬜';
    const sc=(correct!==undefined&&total!==undefined)?` — ${correct}/${total} correct`:'';
    lines.push(`${emoji} ${t.subject}: ${t.topic}${sc}`);
  });
  const doneCount=day.topics.filter((_,i)=>state[i]?.done).length;
  lines.push(`\n${doneCount}/${day.topics.length} topics done 💪`);
  return lines.join('\n');
}

function buildScorecard(day,state){
  const ICONS={RE:'🙏',Maths:'➕',Geography:'🌍',History:'⚔️',Science:'🔬',English:'✍️'};
  document.getElementById('sc-date').textContent=day.date_str;
  const rows=document.getElementById('sc-rows');
  rows.innerHTML='';
  let totalCorrect=0,totalDone=0;
  day.topics.forEach((t,i)=>{
    const correct=state[i]?.correct;
    const total=state[i]?.total;
    if(correct!==undefined)totalCorrect+=correct;
    if(total!==undefined)totalDone+=total;
    const pct=total>0?correct/total:null;
    const cls=pct===null?'none':pct>=0.75?'great':pct>=0.5?'ok':'bad';
    const scoreStr=(correct!==undefined&&total!==undefined)?`${correct}/${total}`:'✓';
    const row=document.createElement('div');
    row.className='scorecard-row';
    row.innerHTML=`<div class="sc-icon">${ICONS[t.subject]}</div>
      <div class="sc-info">
        <div class="sc-subject subj-${t.subject}">${t.subject}</div>
        <div class="sc-topic">${t.topic}</div>
      </div>
      <div class="sc-score ${cls}">${scoreStr}</div>`;
    rows.appendChild(row);
  });
  const summary=totalDone>0?`${totalCorrect}/${totalDone} correct today 💪`:'All 5 topics done! 💪';
  document.getElementById('sc-total').textContent=summary;
}

function updateProgress(day){
  const total=day.topics.length;
  const done=day.topics.filter((_,i)=>state[i]?.done).length;
  document.getElementById('progress-text').textContent=`${done} / ${total} done`;
  document.getElementById('progress-fill').style.width=(done/total*100)+'%';
  const ss=document.getElementById('share-section');
  if(done===total&&total>0){
    ss.classList.add('visible');
    buildScorecard(day,state);
  } else {
    ss.classList.remove('visible');
  }
}

function toggleDone(idx,day){
  if(!state[idx])state[idx]={};
  state[idx].done=!state[idx].done;
  if(!state[idx].done){delete state[idx].total;delete state[idx].correct;}
  saveState(viewingDate,state);render(day);
}

function setTotal(idx,val,day){
  if(!state[idx])state[idx]={};
  state[idx].total=val;
  saveState(viewingDate,state);render(day);
}
function setCorrect(idx,val,day){
  if(!state[idx])state[idx]={};
  state[idx].correct=val;
  saveState(viewingDate,state);render(day);
}

function render(day){
  const content=document.getElementById('main-content');
  if(!day){
    const td=getTodayStr();
    let msg='';
    if(td<'2026-05-11')msg='<div class="rest-card"><span class="rest-emoji">🚀</span><div class="rest-title">Almost time!</div><div class="rest-msg">Revision starts 11th May. See you then, Bert!</div></div>';
    else if(td>='2026-06-15')msg='<div class="rest-card"><span class="rest-emoji">🎉</span><div class="rest-title">Exam week!</div><div class="rest-msg">Go smash it. You\'ve done the work.</div></div>';
    else msg='<div class="rest-card"><span class="rest-emoji">😴</span><div class="rest-title">Nothing today</div><div class="rest-msg">Use the arrows to see other days.</div></div>';
    content.innerHTML=msg;
    document.getElementById('progress-text').textContent='—';
    return;
  }
  document.getElementById('date-str').textContent=day.date_str+' · 5 topics today (~50 mins)';
  let html='<div class="topics-section"><div class="section-label">Today\'s topics</div>';
  day.topics.forEach((t,i)=>{
    const done=state[i]?.done;
    const totalVal=state[i]?.total;
    const correctVal=state[i]?.correct;
    const totalBtns=[5,6,7,8,9,10,12,15,20].map(n=>{
      const cls='score-btn'+(totalVal===n?' sel-total':'');
      return `<button class="${cls}" onclick="setTotal(${i},${n},currentDay)">${n}</button>`;
    }).join('');
    const maxCorrect=totalVal||20;
    const correctBtns=Array.from({length:maxCorrect+1},(_,n)=>n).map(n=>{
      let cls='score-btn';
      if(correctVal===n){cls+=(n>=Math.ceil(maxCorrect*0.75)?' sel-good':n>=Math.ceil(maxCorrect*0.5)?' sel-ok':' sel-bad');}
      return `<button class="${cls}" onclick="setCorrect(${i},${n},currentDay)">${n}</button>`;
    }).join('');
    html+=`<div class="topic-card ${done?'done':''} subj-border-${t.subject}" id="card-${i}">
      <div class="topic-main">
        <div class="topic-check" onclick="toggleDone(${i},currentDay)">${done?'✓':''}</div>
        <div class="topic-info">
          <div class="topic-subject subj-${t.subject}">${ICONS[t.subject]} ${t.subject}</div>
          <div class="topic-name">${t.topic}</div>
          <div class="topic-exam">Exam: ${EXAM_LABELS[t.subject]}</div>
        </div>
        <a href="${t.file}" class="topic-go">${done?'Again':'Go'} →</a>
      </div>
      <div class="score-row">
        <div>
          <div class="score-label">How many questions did you do?</div>
          <div class="score-btns">${totalBtns}</div>
        </div>
        ${totalVal?`<div>
          <div class="score-label">How many did you get right?</div>
          <div class="score-btns">${correctBtns}</div>
        </div>`:''}
      </div>
    </div>`;
  });
  html+='</div>';
  html+=`<div class="share-section" id="share-section">
    <div class="scorecard" id="scorecard-card">
      <div class="scorecard-header">
        <span class="scorecard-emoji">🏆</span>
        <div class="scorecard-title">Today's Scorecard</div>
        <div class="scorecard-date" id="sc-date"></div>
      </div>
      <div class="scorecard-rows" id="sc-rows"></div>
      <div class="scorecard-footer">
        <div class="sc-total" id="sc-total"></div>
        <div class="sc-brand">dmhprior.github.io/bert</div>
      </div>
    </div>
    <div class="screenshot-hint">📸 Screenshot this and send it to Dad!</div>
    <button class="copy-btn" onclick="copyShare()">📋 Copy as text instead</button>
    <div class="copied-msg" id="copied-msg">Copied! Paste it into WhatsApp ✅</div>
  </div>`;
  const prev=getPrev(viewingDate);const next=getNext(viewingDate);const isToday=viewingDate===getTodayStr();
  html+=`<div class="nav-row">
    <button class="nav-btn" onclick="navigateDay('${prev}')" ${!prev?'disabled':''}>← ${prev?new Date(prev+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric'}):'—'}</button>
    ${!isToday?`<button class="nav-btn today-btn" onclick="navigateDay('${getTodayStr()}')">Today</button>`:''}
    <button class="nav-btn" onclick="navigateDay('${next}')" ${!next?'disabled':''}>→ ${next?new Date(next+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric'}):'—'}</button>
  </div>`;
  content.innerHTML=html;
  updateProgress(day);
}

function navigateDay(dt){if(!dt)return;viewingDate=dt;state=loadState(dt);const day=findDay(dt);window.currentDay=day;render(day);window.scrollTo(0,0);}

function copyShare(){
  const text=buildShareText(window.currentDay,state);
  navigator.clipboard.writeText(text).then(()=>{
    document.getElementById('copied-msg').style.display='block';
    setTimeout(()=>{document.getElementById('copied-msg').style.display='none';},3000);
  }).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);document.getElementById('copied-msg').style.display='block';});
}

// Init
state=loadState(viewingDate);
const day=findDay(viewingDate);
window.currentDay=day;
const today=new Date();
document.getElementById('date-str').textContent=today.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
render(day);
</script>
