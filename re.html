<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bert's RE Revision 🙏</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600&display=swap');
  :root{--bg:#160d24;--card:#22123a;--card2:#2a1847;--accent:#c084fc;--accent2:#f472b6;--accent3:#facc15;--text:#f5eeff;--muted:#8060a8;--radius:18px;--green:#4ade80;--red:#f87171;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:18px;line-height:1.6;}
  .header{background:linear-gradient(135deg,#0d0818 0%,#1e0f33 100%);padding:20px 20px 16px;text-align:center;border-bottom:3px solid var(--accent);position:sticky;top:0;z-index:10;}
  .header h1{font-family:'Nunito',sans-serif;font-size:1.6rem;font-weight:900;color:var(--accent);}
  .header p{font-size:0.85rem;color:var(--muted);margin-top:2px;}
  #topic-screen{padding:20px 16px 40px;}
  .section-label{font-family:'Nunito',sans-serif;font-size:0.75rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-left:4px;}
  .topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .topic-btn{background:var(--card);border:2px solid transparent;border-radius:var(--radius);padding:16px 12px;cursor:pointer;text-align:center;transition:all 0.2s;}
  .topic-btn:active{transform:scale(0.97);}
  .topic-btn .icon{font-size:1.8rem;margin-bottom:6px;display:block;}
  .topic-btn .name{font-family:'Nunito',sans-serif;font-weight:800;font-size:0.88rem;color:var(--text);line-height:1.3;}
  .topic-btn .sub{font-size:0.7rem;color:var(--muted);margin-top:3px;}
  .topic-btn[data-color="purple"]{border-color:#c084fc33;} .topic-btn[data-color="purple"]:hover{border-color:var(--accent);background:#c084fc18;}
  .topic-btn[data-color="pink"]{border-color:#f472b633;} .topic-btn[data-color="pink"]:hover{border-color:var(--accent2);background:#f472b618;}
  .topic-btn[data-color="yellow"]{border-color:#facc1533;} .topic-btn[data-color="yellow"]:hover{border-color:var(--accent3);background:#facc1518;}
  .topic-btn[data-color="teal"]{border-color:#2dd4bf33;} .topic-btn[data-color="teal"]:hover{border-color:#2dd4bf;background:#2dd4bf18;}
  .topic-btn[data-color="blue"]{border-color:#60a5fa33;} .topic-btn[data-color="blue"]:hover{border-color:#60a5fa;background:#60a5fa18;}
  #game-screen{display:none;}
  .game-header{background:var(--card);padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:2px solid #ffffff10;}
  .back-btn{background:none;border:2px solid var(--muted);border-radius:50%;width:36px;height:36px;font-size:1rem;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .back-btn:hover{border-color:var(--accent);color:var(--accent);}
  .game-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;flex:1;}
  .score-badge{background:var(--accent);color:#160d24;font-family:'Nunito',sans-serif;font-weight:900;font-size:0.85rem;padding:4px 12px;border-radius:20px;flex-shrink:0;}
  .streak-bar{background:var(--card);padding:8px 20px;border-bottom:1px solid #ffffff08;display:flex;align-items:center;gap:10px;}
  .streak-label{font-size:0.75rem;color:var(--muted);font-weight:700;flex-shrink:0;}
  .streak-dots{display:flex;gap:5px;flex:1;}
  .streak-dot{width:14px;height:14px;border-radius:50%;background:#ffffff15;transition:all 0.3s;flex-shrink:0;}
  .streak-dot.hit{background:var(--green);} .streak-dot.miss{background:var(--red);}
  .finish-btn-small{background:none;border:1.5px solid var(--muted);border-radius:20px;padding:4px 12px;font-size:0.75rem;font-weight:800;color:var(--muted);cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap;}
  .finish-btn-small:hover{border-color:var(--accent);color:var(--accent);}
  .q-area{padding:20px 20px 0;}
  .q-number{font-size:0.75rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
  .q-box{background:var(--card);border-radius:var(--radius);padding:20px 18px;margin-bottom:18px;min-height:90px;display:flex;align-items:center;border:2px solid #ffffff08;}
  .q-text{font-family:'Nunito',sans-serif;font-weight:700;font-size:1.1rem;line-height:1.5;color:var(--text);}
  .loading-dots{display:flex;gap:6px;align-items:center;}
  .loading-dots span{width:10px;height:10px;background:var(--accent);border-radius:50%;animation:bounce 1.2s infinite;}
  .loading-dots span:nth-child(2){animation-delay:0.2s;background:var(--accent2);}
  .loading-dots span:nth-child(3){animation-delay:0.4s;background:var(--accent3);}
  @keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:0.4;}40%{transform:translateY(-10px);opacity:1;}}
  .options-grid{display:flex;flex-direction:column;gap:10px;padding:0 20px 16px;}
  .option-btn{background:var(--card2);border:2.5px solid #ffffff12;border-radius:var(--radius);padding:15px 16px;cursor:pointer;text-align:left;font-family:'Nunito',sans-serif;font-weight:700;font-size:1rem;color:var(--text);transition:all 0.15s;display:flex;align-items:center;gap:12px;line-height:1.4;}
  .option-btn:hover:not(:disabled){border-color:var(--accent);background:#c084fc12;}
  .option-btn .opt-letter{width:30px;height:30px;border-radius:50%;background:#ffffff12;display:flex;align-items:center;justify-content:center;font-size:0.82rem;flex-shrink:0;font-weight:900;}
  .option-btn.correct{border-color:var(--green);background:#4ade8018;} .option-btn.correct .opt-letter{background:var(--green);color:#160d24;}
  .option-btn.wrong{border-color:var(--red);background:#f8717118;} .option-btn.wrong .opt-letter{background:var(--red);color:#160d24;}
  .option-btn:disabled{cursor:default;}
  .feedback-box{margin:0 20px 16px;padding:14px 16px;border-radius:var(--radius);font-family:'Nunito',sans-serif;font-weight:700;font-size:0.9rem;line-height:1.5;display:none;}
  .feedback-box.correct{background:#4ade8018;border:2px solid var(--green);color:#a7f3d0;}
  .feedback-box.wrong{background:#f8717118;border:2px solid var(--red);color:#fca5a5;}
  .feedback-emoji{font-size:1.3rem;margin-bottom:4px;display:block;}
  .feedback-explain{color:var(--text);margin-top:6px;font-weight:600;font-size:0.88rem;}
  .next-btn{display:none;margin:0 20px 24px;width:calc(100% - 40px);padding:16px;background:var(--accent);color:#160d24;border:none;border-radius:var(--radius);font-family:'Nunito',sans-serif;font-weight:900;font-size:1.05rem;cursor:pointer;}
  #end-screen{display:none;padding:40px 20px;text-align:center;}
  .end-emoji{font-size:4rem;margin-bottom:16px;}
  .end-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.8rem;color:var(--accent);margin-bottom:8px;}
  .end-score{font-family:'Nunito',sans-serif;font-weight:800;font-size:3rem;margin:20px 0;color:var(--text);}
  .end-score span{color:var(--muted);font-size:1.5rem;}
  .end-msg{color:var(--muted);font-size:0.95rem;margin-bottom:30px;line-height:1.6;}
  .retry-btn{display:block;width:100%;padding:18px;background:var(--accent);color:#160d24;border:none;border-radius:var(--radius);font-family:'Nunito',sans-serif;font-weight:900;font-size:1.1rem;cursor:pointer;margin-bottom:12px;}
  .menu-btn{display:block;width:100%;padding:18px;background:var(--card);color:var(--text);border:2px solid #ffffff20;border-radius:var(--radius);font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;cursor:pointer;}
  .stars{color:#facc15;font-size:1.5rem;}
  .error-box{margin:0 20px 16px;padding:14px;background:#f472b618;border:2px solid var(--accent2);border-radius:var(--radius);color:#fbcfe8;font-size:0.88rem;display:none;}
  .tip-box{margin-top:16px;padding:14px 16px;background:var(--card);border-radius:14px;font-size:0.82rem;color:var(--muted);line-height:1.6;}
</style>
</head>
<body>
<div class="header"><h1>🙏 RE Revision</h1><p>Bert's Year 7 · REP · Endless Mode</p></div>
<div id="topic-screen">
  <div style="padding:20px 16px 10px;">
    <div class="section-label">Choose a topic</div>
    <div class="topic-grid">
      <button class="topic-btn" data-color="purple" onclick="startGame('religions')"><span class="icon">📖</span><div class="name">World Religions</div><div class="sub">6 main faiths, holy books</div></button>
      <button class="topic-btn" data-color="pink" onclick="startGame('holybooks')"><span class="icon">✡️</span><div class="name">Holy Books & Authority</div><div class="sub">Origins, relevance, problems</div></button>
      <button class="topic-btn" data-color="yellow" onclick="startGame('god')"><span class="icon">🤔</span><div class="name">Does God Exist?</div><div class="sub">Arguments for and against</div></button>
      <button class="topic-btn" data-color="teal" onclick="startGame('afterlife')"><span class="icon">✨</span><div class="name">Life After Death</div><div class="sub">Religious views on afterlife</div></button>
      <button class="topic-btn" data-color="blue" onclick="startGame('ethics')"><span class="icon">⚖️</span><div class="name">Ethics & Morality</div><div class="sub">Trolley problem, prejudice</div></button>
      <button class="topic-btn" data-color="purple" onclick="startGame('commandments')"><span class="icon">📜</span><div class="name">Ten Commandments</div><div class="sub">Rules, Good Samaritan</div></button>
      <button class="topic-btn" data-color="pink" onclick="startGame('creation')"><span class="icon">🌍</span><div class="name">Creation & Stewardship</div><div class="sub">How world was made, caring</div></button>
      <button class="topic-btn" data-color="teal" onclick="startGame('sikhism')"><span class="icon">🕌</span><div class="name">Sikhism</div><div class="sub">Guru Nanak, 5 Ks, Sewa</div></button>
    </div>
    <div class="tip-box">💡 RE loves <strong style="color:var(--text)">key terms and different viewpoints</strong>. Endless mode — tap "Finish" when done.</div>
  </div>
</div>
<div id="game-screen">
  <div class="game-header"><button class="back-btn" onclick="goHome()">←</button><div class="game-title" id="game-title">Topic</div><div class="score-badge" id="score-badge">0 / 0</div></div>
  <div class="streak-bar"><div class="streak-label">Last 10:</div><div class="streak-dots" id="streak-dots"></div><button class="finish-btn-small" onclick="showEnd()">Finish ✓</button></div>
  <div class="q-area"><div class="q-number" id="q-number">Question 1</div><div class="q-box" id="q-box"><div class="loading-dots"><span></span><span></span><span></span></div></div></div>
  <div class="options-grid" id="options-grid"></div>
  <div class="feedback-box" id="feedback-box"></div>
  <div class="error-box" id="error-box">Couldn't load — tap Next to try again.</div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next question →</button>
</div>
<div id="end-screen">
  <div class="end-emoji" id="end-emoji">🎉</div><div class="end-title" id="end-title">Session done!</div><div class="stars" id="end-stars">⭐⭐⭐</div>
  <div class="end-score"><span id="final-score">0</span> <span>/ <span id="final-total">0</span></span></div><div class="end-msg" id="end-msg"></div>
  <button class="retry-btn" onclick="retryGame()">Same topic again 🔄</button><button class="menu-btn" onclick="goHome()">← Choose another topic</button>
</div>
<script>
const MAX_Q=50;
const TOPICS={
  religions:{name:"World Religions",context:`Year 7 REP: The 6 main world religions. Christianity: holy book=Bible, Jesus is central, God is creator and loving, Trinity (Father/Son/Holy Spirit), place of worship=church. Islam: holy book=Qur'an, Muhammad is the prophet, Allah is God, 5 Pillars (Shahada/faith declaration, Salat/prayer 5x daily, Zakat/charity, Sawm/fasting in Ramadan, Hajj/pilgrimage to Mecca), place of worship=mosque. Judaism: holy book=Torah (first 5 books of Hebrew Bible), Moses is key figure, believe in one God (monotheism), Shabbat (day of rest), place of worship=synagogue. Hinduism: many holy texts (Vedas, Bhagavad Gita), many deities (Brahma/creator, Vishnu/preserver, Shiva/destroyer), cycle of reincarnation (samsara), karma, dharma (duty), place of worship=mandir/temple. Buddhism: no creator God, Siddhartha Gautama became the Buddha ("enlightened one"), Four Noble Truths (life involves suffering; suffering caused by desire; can end suffering; follow Eightfold Path), mediation, Nirvana=end of suffering, place of worship=temple/vihara. Sikhism: holy book=Guru Granth Sahib, founded by Guru Nanak, believe in one God (Waheguru), 10 human Gurus, place of worship=Gurdwara. Key stat: 68% of world population have some religious belief.`},
  holybooks:{name:"Holy Books & Authority",context:`Year 7 REP: Holy Books - Origins, Authority and Relevance. Bible: Christian holy book. Old Testament = Jewish scriptures (Torah). New Testament = accounts of Jesus's life (Gospels) and early Church. Written by many authors over hundreds of years. Translated into over 2000 languages. Qur'an: Islamic holy book. Believed to be direct word of God (Allah) revealed to Muhammad through Angel Jibril over 23 years. Written in Arabic — Muslims believe it should be read in Arabic. Torah: Jewish holy book. First 5 books of the Hebrew Bible. Believed to be given by God to Moses on Mount Sinai. Arguments holy books ARE relevant: provide moral guidance, give comfort, create community, historical record, believers see them as God's direct word. Arguments holy books may NOT be relevant: written thousands of years ago, contradict modern science (evolution, age of universe), interpreted very differently by different groups, some teachings considered outdated (e.g. on women's roles, sexuality). Fundamentalists: believe holy book is literally true word of God — follow it exactly. Liberals: see holy books as inspired by God but written by humans — interpret teachings for modern context. Religion positive contributions: hospitals, schools, art, music, charity work, community. Religion negative contributions: wars (Crusades, religious conflicts), persecution, extremism, discrimination.`},
  god:{name:"Does God Exist?",context:`Year 7 REP: The Existence of God - Atheism, Agnosticism, Theism. Theist: someone who BELIEVES in God or gods. Atheist: someone who does NOT believe in God or any gods. Agnostic: someone UNSURE — thinks it cannot be proven either way. Arguments God DOES exist: 1) Design argument (Teleological): world is so complex and beautiful it must have been designed — like a watch needs a watchmaker (William Paley). 2) Cosmological argument: everything has a first cause — the universe must have had a first cause = God. 3) Ontological argument: God is the greatest being conceivable; a being that exists is greater than one that doesn't; therefore God must exist. 4) Religious experience: millions report feeling God's presence, miracles, answered prayers — too many to ignore. 5) Moral argument: humans have innate sense of right and wrong — must come from God. Arguments God does NOT exist: 1) Problem of evil (theodicy): if God is all-powerful (omnipotent), all-knowing (omniscient), all-loving (omnibenevolent), why is there suffering and evil? 2) Science explains creation: Big Bang theory and evolution explain universe and life without needing God. 3) No physical evidence: God cannot be seen, touched or scientifically measured. 4) Religious disagreement: different religions have different gods — they can't all be right. 5) Psychological explanation: Freud said God is a father figure we invented for comfort.`},
  afterlife:{name:"Life After Death",context:`Year 7 REP: Life After Death - Religious and Non-Religious Views. Christianity: most Christians believe in heaven (reward for good life/faith) and hell (punishment/separation from God). Resurrection: belief Jesus rose from dead proves life after death is possible. Some believe in purgatory (Catholic) — place of purification before heaven. Islam: believe in Akhirah (afterlife). After death, wait in barzakh (intermediate state) until Day of Judgement. Allah judges all deeds. Good → paradise (Jannah, described as a beautiful garden). Bad → hell (Jahannam). Judaism: varied views. Less focus on afterlife than other religions. Some believe in Olam Ha-Ba (world to come) or resurrection. Focus is more on living well NOW in this world. Hinduism and Buddhism: believe in REINCARNATION — soul is reborn in a new body (human, animal or other). Quality of rebirth determined by karma (actions in past lives). Goal: reach Moksha (Hinduism)/Nirvana (Buddhism) = escape the cycle of rebirth. Humanist/Atheist view: no life after death — this life is all we have, so make it meaningful. Near-death experiences (NDE): some people report experiences during clinical death — bright light, peace, seeing deceased relatives. Some see as evidence of afterlife; scientists say brain activity causes them. Evidence FOR afterlife: NDEs, religious texts, personal spiritual experiences. Evidence AGAINST: no scientific proof, brain activity explains NDEs, no one has returned to describe it.`},
  ethics:{name:"Ethics & Morality",context:`Year 7 REP: Ethics, Moral Decision-Making, Prejudice and Discrimination. Ethics: the study of right and wrong, and how we should behave. Morality: principles about what is right and wrong. The Trolley Problem: runaway trolley will kill 5 people. You can pull lever to divert it — but it will kill 1 person. Do you pull the lever? Utilitarian answer: yes — saves most lives (greatest good for greatest number, Jeremy Bentham/John Stuart Mill). Deontological answer: no — it is wrong to actively cause someone's death even to save others (Immanuel Kant: treat people as ends, not means). Religious views: most religions value all human life equally — very difficult dilemma. Prejudice: judging someone unfairly BEFORE getting to know them (pre-judge). Based on: race, religion, gender, age, disability, sexuality, etc. Discrimination: ACTING on prejudice — treating someone unfairly because of prejudice. Stereotype: oversimplified, fixed idea about a group of people. The Good Samaritan (Luke 10, Bible): Jewish man beaten and left to die. Priest walks past, Levite walks past. Samaritan (from rival group) stops and helps — pays for his care. Lesson: "love your neighbour" regardless of background. Golden Rule: "treat others as you would like to be treated" — found in ALL major religions. How to combat prejudice: education, laws against discrimination, challenging stereotypes, celebrating diversity.`},
  commandments:{name:"Ten Commandments & Rules",context:`Year 7 REP: The Ten Commandments and Rules in Society. The Ten Commandments: given by God to Moses on Mount Sinai (found in both Bible and Torah). 1) Have no other gods before God. 2) Do not worship idols. 3) Do not misuse God's name. 4) Keep the Sabbath holy (day of rest — Sunday for Christians, Saturday for Jews). 5) Honour your father and mother. 6) Do not murder. 7) Do not commit adultery (be unfaithful in marriage). 8) Do not steal. 9) Do not give false testimony (do not lie). 10) Do not covet (desire) your neighbour's possessions. Are they still relevant today? For: many form basis of modern law (murder, theft, lying). They provide clear moral guidance. Protect people's rights. Against: some are very specifically religious (Sabbath). Society has moved on — different views on marriage, etc. Not everyone is religious. Do we need laws and rules? Without rules: chaos and unfairness. Rules protect the weak from the powerful. Laws allow society to function. But rules can be unjust — e.g. laws that discriminated against Black people in apartheid South Africa or Jim Crow laws in America. Civil disobedience: breaking an unjust law as a form of protest (e.g. Rosa Parks refusing to give up her bus seat).`},
  creation:{name:"Creation & Stewardship",context:`Year 7 REP: How Was the World Made? Should We Care for It? Creation views: Religious (Creationist): God created the world and everything in it. Christians use Genesis 1 — God created world in 6 days, rested on 7th. Literal creationists believe this happened exactly as described ~6000 years ago. Non-literal/liberal: treat Genesis as a metaphor (story teaching deeper truth), accept scientific explanations. Scientific: Big Bang Theory — ~13.8 billion years ago, universe began from incredibly hot, dense point and expanded rapidly. Evolution (Charles Darwin, 1859): species change over time through natural selection — those best adapted survive and reproduce. Many religious people accept both Big Bang/evolution AND believe God was behind it (theistic evolution). Stewardship: responsibility to care for creation. Christian stewardship: Genesis says humans have "dominion" over creation — must use responsibly, not destructively. Islamic stewardship: humans are Khalifah (guardians/trustees) of Allah's creation — accountable to God for how they treat it. Environmental problems we cause: pollution, deforestation, climate change, species extinction, plastic in oceans. What religions say we should do: reduce consumption, protect nature, live sustainably, respect all living things. Secular (non-religious) arguments for caring for environment: future generations, biodiversity, our own health and survival.`},
  sikhism:{name:"Sikhism",context:`Year 7 REP: Sikhism - Beliefs, Practices and Identity. Founded by Guru Nanak in Punjab region (modern India/Pakistan) in late 1400s. Sikhs believe in one God (Waheguru) — omnipresent, shapeless, timeless, without fear or hatred. The 10 human Gurus: Guru Nanak (1st, founder) to Guru Gobind Singh (10th, last human Guru). The Guru Granth Sahib is the eternal living Guru — the holy scripture of Sikhism. Treated with great respect: has its own room, is "put to bed" at night, read from a raised platform (takht). Gurdwara: Sikh place of worship ("gateway to the Guru"). Always has a Langar (free community kitchen). Guru Nanak: Born 1469, died 1539. His key teachings: Ik Onkar (there is only one God), Sewa (selfless service), equality of all people regardless of caste, gender or religion. Famous quote: "There is no Hindu, there is no Muslim" — emphasising shared humanity. Rejected the caste system. The 5 Ks (Panj Kakars) — worn by initiated Khalsa Sikhs: 1) Kesh: uncut hair (acceptance of God's gift/will). 2) Kangha: wooden comb in hair (spiritual discipline, cleanliness). 3) Kara: steel bracelet (reminder to remember God in all actions). 4) Kachera: cotton underwear (modesty, moral strength). 5) Kirpan: ceremonial sword (duty to stand up for justice and defend the weak). Sewa: selfless service — central to Sikh practice. Any service done without expecting reward. Langar: free community kitchen in every Gurdwara — open to EVERYONE regardless of religion, caste or background. Everyone sits on the floor together — demonstrates equality. Shows Sewa in action. Philosophical question: Can any act be truly selfless (altruistic) if we feel good about doing it?`}
};
let currentTopic=null,questions=[],currentQ=0,score=0,answered=false,recentResults=[];
function goHome(){document.getElementById('topic-screen').style.display='block';document.getElementById('game-screen').style.display='none';document.getElementById('end-screen').style.display='none';}
async function startGame(k){currentTopic=k;questions=[];currentQ=0;score=0;answered=false;recentResults=[];document.getElementById('topic-screen').style.display='none';document.getElementById('end-screen').style.display='none';document.getElementById('game-screen').style.display='block';document.getElementById('game-title').textContent=TOPICS[k].name;updateScoreBadge();updateStreakDots();updateQNumber();await loadQuestion();}
function updateScoreBadge(){document.getElementById('score-badge').textContent=`${score} / ${currentQ}`;}
function updateQNumber(){document.getElementById('q-number').textContent=`Question ${currentQ+1}`;}
function updateStreakDots(){const c=document.getElementById('streak-dots');c.innerHTML='';const s=recentResults.slice(-10);for(let i=0;i<10;i++){const d=document.createElement('div');d.className='streak-dot';if(i<s.length){if(s[i])d.classList.add('hit');else d.classList.add('miss');}c.appendChild(d);}}
async function loadQuestion(){
  answered=false;['feedback-box','error-box'].forEach(id=>document.getElementById(id).style.display='none');document.getElementById('next-btn').style.display='none';document.getElementById('options-grid').innerHTML='';document.getElementById('q-box').innerHTML='<div class="loading-dots"><span></span><span></span><span></span></div>';
  const t=TOPICS[currentTopic];const prev=questions.slice(-25).map(q=>q.question).join(' | ');
  const prompt=`Friendly quiz master helping 11-year-old Bert (dyslexic) revise Year 7 RE. SHORT and CLEAR.\n\nContext:\n${t.context}\n\n${prev?`Do NOT repeat: ${prev}`:''}\n\nGenerate ONE multiple choice question. Vary types: definitions, religious views, comparisons, examples. 1 sentence max 15 words. 4 options max 8 words each. 1 correct. 1-sentence explanation max 20 words.\n\nJSON only: {"question":"...","options":["...","...","...","..."],"correct":0,"explanation":"..."}`;
  try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:prompt}]})});if(!r.ok)throw 0;const d=await r.json();const q=JSON.parse(d.content[0].text.trim().replace(/```json|```/g,''));questions.push(q);renderQuestion(q);}
  catch(e){document.getElementById('q-box').innerHTML='<span class="q-text">Couldn\'t load — tap Next.</span>';document.getElementById('error-box').style.display='block';document.getElementById('next-btn').style.display='block';}
}
function renderQuestion(q){document.getElementById('q-box').innerHTML=`<span class="q-text">${q.question}</span>`;const g=document.getElementById('options-grid');g.innerHTML='';['A','B','C','D'].forEach((l,i)=>{const b=document.createElement('button');b.className='option-btn';b.innerHTML=`<span class="opt-letter">${l}</span><span>${q.options[i]}</span>`;b.onclick=()=>answer(i,q);g.appendChild(b);});}
function answer(chosen,q){if(answered)return;answered=true;const btns=document.getElementById('options-grid').querySelectorAll('.option-btn');const c=q.correct;const ok=chosen===c;if(ok)score++;recentResults.push(ok);btns.forEach((b,i)=>{b.disabled=true;if(i===c)b.classList.add('correct');else if(i===chosen&&!ok)b.classList.add('wrong');});const fb=document.getElementById('feedback-box');fb.className='feedback-box '+(ok?'correct':'wrong');fb.style.display='block';fb.innerHTML=ok?`<span class="feedback-emoji">🎉</span><strong>Correct!</strong><div class="feedback-explain">${q.explanation}</div>`:`<span class="feedback-emoji">😬</span><strong>Not quite — answer was ${'ABCD'[c]}: ${q.options[c]}</strong><div class="feedback-explain">${q.explanation}</div>`;updateScoreBadge();updateStreakDots();const nb=document.getElementById('next-btn');nb.style.display='block';nb.textContent=currentQ+1>=MAX_Q?'See results 🏆':'Next question →';}
async function nextQuestion(){currentQ++;if(currentQ>=MAX_Q){showEnd();return;}updateQNumber();await loadQuestion();}
function showEnd(){document.getElementById('game-screen').style.display='none';document.getElementById('end-screen').style.display='block';const tot=currentQ;const pct=tot>0?score/tot:0;let e,t,m,s;if(pct>=0.9){e='🏆';t='Outstanding!';s='⭐⭐⭐';m=`${score}/${tot} — brilliant RE, Bert!`;}else if(pct>=0.75){e='🎉';t='Brilliant!';s='⭐⭐⭐';m=`${score}/${tot}. Really strong.`;}else if(pct>=0.6){e='💪';t='Good effort!';s='⭐⭐';m=`${score}/${tot}. Solid. Another round will help.`;}else{e='📚';t='Keep going!';s='⭐';m=`${score}/${tot}. RE takes practice — keep at it!`;}document.getElementById('end-emoji').textContent=e;document.getElementById('end-title').textContent=t;document.getElementById('end-stars').textContent=s;document.getElementById('final-score').textContent=score;document.getElementById('final-total').textContent=tot;document.getElementById('end-msg').textContent=m;}
function retryGame(){startGame(currentTopic);}
</script>
