<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bert's Science Revision 🔬</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600&display=swap');
  :root{--bg:#0f1923;--card:#1a2535;--card2:#1f2e42;--accent:#00d4aa;--accent2:#ff6b6b;--accent3:#ffd93d;--text:#e8f4f8;--muted:#7a9bb5;--radius:18px;--green:#4ade80;--red:#f87171;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:18px;line-height:1.6;letter-spacing:0.01em;}
  .header{background:linear-gradient(135deg,#0d2137 0%,#1a3a5c 100%);padding:20px 20px 16px;text-align:center;border-bottom:3px solid var(--accent);position:sticky;top:0;z-index:10;}
  .header h1{font-family:'Nunito',sans-serif;font-size:1.6rem;font-weight:900;color:var(--accent);}
  .header p{font-size:0.85rem;color:var(--muted);margin-top:2px;}
  #topic-screen{padding:20px 16px 40px;}
  .section-label{font-family:'Nunito',sans-serif;font-size:0.75rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-left:4px;}
  .topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .topic-btn{background:var(--card);border:2px solid transparent;border-radius:var(--radius);padding:18px 14px;cursor:pointer;text-align:center;transition:all 0.2s;}
  .topic-btn:active{transform:scale(0.97);}
  .topic-btn .icon{font-size:2rem;margin-bottom:8px;display:block;}
  .topic-btn .name{font-family:'Nunito',sans-serif;font-weight:800;font-size:0.9rem;color:var(--text);line-height:1.3;}
  .topic-btn .sub{font-size:0.72rem;color:var(--muted);margin-top:4px;}
  .topic-btn[data-color="teal"]{border-color:#00d4aa33;} .topic-btn[data-color="teal"]:hover{border-color:var(--accent);background:#00d4aa18;}
  .topic-btn[data-color="pink"]{border-color:#ff6b6b33;} .topic-btn[data-color="pink"]:hover{border-color:var(--accent2);background:#ff6b6b18;}
  .topic-btn[data-color="yellow"]{border-color:#ffd93d33;} .topic-btn[data-color="yellow"]:hover{border-color:var(--accent3);background:#ffd93d18;}
  .topic-btn[data-color="purple"]{border-color:#a78bfa33;} .topic-btn[data-color="purple"]:hover{border-color:#a78bfa;background:#a78bfa18;}
  .topic-btn[data-color="blue"]{border-color:#60a5fa33;} .topic-btn[data-color="blue"]:hover{border-color:#60a5fa;background:#60a5fa18;}
  .topic-btn[data-color="orange"]{border-color:#fb923c33;} .topic-btn[data-color="orange"]:hover{border-color:#fb923c;background:#fb923c18;}
  #game-screen{display:none;}
  .game-header{background:var(--card);padding:16px 20px;display:flex;align-items:center;gap:12px;border-bottom:2px solid #ffffff10;}
  .back-btn{background:none;border:2px solid var(--muted);border-radius:50%;width:38px;height:38px;font-size:1.1rem;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .back-btn:hover{border-color:var(--accent);color:var(--accent);}
  .game-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.1rem;flex:1;}
  .score-badge{background:var(--accent);color:#0f1923;font-family:'Nunito',sans-serif;font-weight:900;font-size:0.85rem;padding:4px 12px;border-radius:20px;flex-shrink:0;}
  .streak-bar{background:var(--card);padding:8px 20px;border-bottom:1px solid #ffffff08;display:flex;align-items:center;gap:10px;}
  .streak-label{font-size:0.75rem;color:var(--muted);font-weight:700;flex-shrink:0;}
  .streak-dots{display:flex;gap:5px;flex:1;}
  .streak-dot{width:14px;height:14px;border-radius:50%;background:#ffffff15;transition:all 0.3s;flex-shrink:0;}
  .streak-dot.hit{background:var(--green);} .streak-dot.miss{background:var(--red);}
  .finish-btn-small{background:none;border:1.5px solid var(--muted);border-radius:20px;padding:4px 12px;font-size:0.75rem;font-weight:800;color:var(--muted);cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap;}
  .finish-btn-small:hover{border-color:var(--accent);color:var(--accent);}
  .q-area{padding:20px 20px 0;}
  .q-number{font-size:0.75rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
  .q-box{background:var(--card);border-radius:var(--radius);padding:22px 20px;margin-bottom:20px;min-height:90px;display:flex;align-items:center;border:2px solid #ffffff08;}
  .q-text{font-family:'Nunito',sans-serif;font-weight:700;font-size:1.1rem;line-height:1.5;color:var(--text);}
  .loading-dots{display:flex;gap:6px;align-items:center;}
  .loading-dots span{width:10px;height:10px;background:var(--accent);border-radius:50%;animation:bounce 1.2s infinite;}
  .loading-dots span:nth-child(2){animation-delay:0.2s;background:var(--accent3);}
  .loading-dots span:nth-child(3){animation-delay:0.4s;background:var(--accent2);}
  @keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:0.4;}40%{transform:translateY(-10px);opacity:1;}}
  .options-grid{display:flex;flex-direction:column;gap:10px;padding:0 20px 20px;}
  .option-btn{background:var(--card2);border:2.5px solid #ffffff12;border-radius:var(--radius);padding:16px 18px;cursor:pointer;text-align:left;font-family:'Nunito',sans-serif;font-weight:700;font-size:1rem;color:var(--text);transition:all 0.15s;display:flex;align-items:center;gap:14px;line-height:1.4;}
  .option-btn:hover:not(:disabled){border-color:var(--accent);background:#00d4aa12;}
  .option-btn .opt-letter{width:32px;height:32px;border-radius:50%;background:#ffffff12;display:flex;align-items:center;justify-content:center;font-size:0.85rem;flex-shrink:0;font-weight:900;}
  .option-btn.correct{border-color:var(--green);background:#4ade8018;} .option-btn.correct .opt-letter{background:var(--green);color:#0f1923;}
  .option-btn.wrong{border-color:var(--red);background:#f8717118;} .option-btn.wrong .opt-letter{background:var(--red);color:#0f1923;}
  .option-btn:disabled{cursor:default;}
  .feedback-box{margin:0 20px 20px;padding:16px 18px;border-radius:var(--radius);font-family:'Nunito',sans-serif;font-weight:700;font-size:0.95rem;line-height:1.5;display:none;}
  .feedback-box.correct{background:#4ade8018;border:2px solid var(--green);color:#a7f3d0;}
  .feedback-box.wrong{background:#f8717118;border:2px solid var(--red);color:#fca5a5;}
  .feedback-emoji{font-size:1.4rem;margin-bottom:6px;display:block;}
  .feedback-explain{color:var(--text);margin-top:8px;font-weight:600;font-size:0.9rem;}
  .next-btn{display:none;margin:0 20px 30px;width:calc(100% - 40px);padding:18px;background:var(--accent);color:#0f1923;border:none;border-radius:var(--radius);font-family:'Nunito',sans-serif;font-weight:900;font-size:1.1rem;cursor:pointer;}
  #end-screen{display:none;padding:40px 20px;text-align:center;}
  .end-emoji{font-size:4rem;margin-bottom:16px;}
  .end-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.8rem;color:var(--accent);margin-bottom:8px;}
  .end-score{font-family:'Nunito',sans-serif;font-weight:800;font-size:3rem;margin:20px 0;color:var(--text);}
  .end-score span{color:var(--muted);font-size:1.5rem;}
  .end-msg{color:var(--muted);font-size:0.95rem;margin-bottom:30px;line-height:1.6;}
  .retry-btn{display:block;width:100%;padding:18px;background:var(--accent);color:#0f1923;border:none;border-radius:var(--radius);font-family:'Nunito',sans-serif;font-weight:900;font-size:1.1rem;cursor:pointer;margin-bottom:12px;}
  .menu-btn{display:block;width:100%;padding:18px;background:var(--card);color:var(--text);border:2px solid #ffffff20;border-radius:var(--radius);font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;cursor:pointer;}
  .stars{color:var(--accent3);font-size:1.5rem;}
  .error-box{margin:0 20px 20px;padding:16px;background:#ff6b6b18;border:2px solid var(--accent2);border-radius:var(--radius);color:#fca5a5;font-size:0.9rem;display:none;}
</style>
</head>
<body>
<div class="header"><h1>🔬 Science Revision</h1><p>Bert's Year 7 · Assessment 3 · Endless Mode</p></div>
<div id="topic-screen">
  <div style="padding:20px 16px 10px;">
    <div class="section-label">Choose a topic</div>
    <div class="topic-grid">
      <button class="topic-btn" data-color="pink" onclick="startGame('reproduction')"><span class="icon">🌸</span><div class="name">Reproduction</div><div class="sub">Sperm, organs, fertilisation, menstrual cycle</div></button>
      <button class="topic-btn" data-color="teal" onclick="startGame('plants')"><span class="icon">🌼</span><div class="name">Plants & Body Systems</div><div class="sub">Flower parts, seed dispersal, organ systems</div></button>
      <button class="topic-btn" data-color="yellow" onclick="startGame('chemistry')"><span class="icon">⚗️</span><div class="name">Elements & Particles</div><div class="sub">Atoms, compounds, particle diagrams, metals</div></button>
      <button class="topic-btn" data-color="orange" onclick="startGame('reactions')"><span class="icon">🔥</span><div class="name">Reactions & pH</div><div class="sub">Neutralisation, acids, alkalis, indicators</div></button>
      <button class="topic-btn" data-color="blue" onclick="startGame('energy')"><span class="icon">🔋</span><div class="name">Energy</div><div class="sub">Stores, transfers, GPE, efficiency equations</div></button>
      <button class="topic-btn" data-color="purple" onclick="startGame('lightsound')"><span class="icon">🌈</span><div class="name">Light & Sound</div><div class="sub">Reflection, colour, spectrum, hearing</div></button>
    </div>
    <div style="margin-top:16px;padding:14px 16px;background:var(--card);border-radius:14px;font-size:0.82rem;color:var(--muted);line-height:1.6;">💡 Every question comes from your <strong style="color:var(--text)">exact exam checklist</strong>. Tap Finish when you're done.</div>
  </div>
</div>
<div id="game-screen">
  <div class="game-header"><button class="back-btn" onclick="goHome()">←</button><div class="game-title" id="game-title">Topic</div><div class="score-badge" id="score-badge">0 / 0</div></div>
  <div class="streak-bar"><div class="streak-label">Last 10:</div><div class="streak-dots" id="streak-dots"></div><button class="finish-btn-small" onclick="showEnd()">Finish ✓</button></div>
  <div class="q-area"><div class="q-number" id="q-number">Question 1</div><div class="q-box" id="q-box"><div class="loading-dots"><span></span><span></span><span></span></div></div></div>
  <div class="options-grid" id="options-grid"></div>
  <div class="feedback-box" id="feedback-box"></div>
  <div class="error-box" id="error-box">Couldn't load — tap Next to try again.</div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next question →</button>
</div>
<div id="end-screen">
  <div class="end-emoji" id="end-emoji">🎉</div><div class="end-title" id="end-title">Session done!</div><div class="stars" id="end-stars">⭐⭐⭐</div>
  <div class="end-score"><span id="final-score">0</span><span>/ <span id="final-total">0</span></span></div><div class="end-msg" id="end-msg"></div>
  <button class="retry-btn" onclick="retryGame()">Same topic again 🔄</button><button class="menu-btn" onclick="goHome()">← Choose another topic</button>
</div>
<script>
const TOPICS={
  reproduction:{name:"Reproduction",context:`Year 7 Science exam checklist skills to test:
- Sperm cell adaptations: tail/flagellum to swim, lots of mitochondria for energy, streamlined head, 23 chromosomes, acrosome breaks into egg.
- Male reproductive organs and functions: testes (make sperm), sperm duct (carries sperm), urethra (carries sperm out), penis, glands (produce fluid), scrotum (holds testes).
- Female reproductive organs and functions: ovaries (produce eggs), fallopian tube/oviduct (egg travels here; fertilisation happens here), uterus/womb (baby develops here), cervix (neck of uterus), vagina.
- Fertilisation: sperm + egg meet in fallopian tube. Sperm has 23 chromosomes, egg has 23 chromosomes, zygote has 46 chromosomes. Zygote implants in uterus.
- Menstrual cycle is 28 days. Day 1: menstruation (uterus lining breaks down). Days 1-13: lining builds up. Day 10-14: ovulation (egg released). Days 14-28: lining stays thick. If no fertilisation, cycle repeats.`},
  plants:{name:"Plants & Body Systems",context:`Year 7 Science exam checklist skills to test:
- Parts of a flower: petal (attracts insects), sepal (protects bud), anther (produces pollen), filament (supports anther), stigma (receives pollen), style, ovary (contains ovules), nectary (nectar). Stamen = male (anther+filament). Pistil = female (stigma+style+ovary).
- Seed dispersal: wind (dandelion, sycamore - light and float), animal external (hooks on fur, burdock), animal internal (eaten in fruit, berry), water (float, coconut), explosion (pod bursts, peas).
- Key body organs: heart, lungs, stomach, small intestine, large intestine, liver, kidneys, brain.
- Circulatory system: heart + blood vessels. Transports oxygen, nutrients, removes waste CO2.
- Respiratory system: lungs, trachea, bronchi. Takes in oxygen, removes carbon dioxide.
- Digestive system: mouth to rectum. Breaks down food, absorbs nutrients.
- Skeletal system: bones. Supports body, protects organs, enables movement with muscles.
- Muscular system: muscles in antagonistic pairs (bicep/tricep - one contracts while other relaxes).`},
  chemistry:{name:"Elements & Particles",context:`Year 7 Science exam checklist skills to test:
- Atom: smallest particle of an element.
- Element: only ONE type of atom (O, Fe, C, H, Na).
- Compound: TWO OR MORE types of atom chemically bonded (H2O, CO2, NaCl). Different properties to its elements.
- Mixture: substances NOT chemically bonded, can be separated (salt water, air).
- Molecule: two or more atoms bonded (O2, H2O).
- Identifying from formula: H2O = compound. O2 = element (one type of atom). NaCl = compound. CO2 = compound.
- Solid particles: regular arrangement, vibrate in fixed positions, very close together.
- Liquid particles: random arrangement, move around each other, close together.
- Gas particles: random arrangement, move quickly in all directions, far apart.
- Properties of metals: good conductors of heat and electricity, high melting point, high density, malleable, ductile, shiny, sonorous.
- Common formulas: O2=oxygen, H2O=water, CO2=carbon dioxide, NaCl=salt/sodium chloride.`},
  reactions:{name:"Reactions & pH",context:`Year 7 Science exam checklist skills to test:
- pH scale: 0-14. 0-6 = acidic. 7 = neutral. 8-14 = alkaline. Lower number = stronger acid. Higher number = stronger alkali.
- Examples: hydrochloric acid pH1, vinegar pH3, water pH7, baking soda pH9, sodium hydroxide pH14.
- Indicators: universal indicator is red/orange in acid, green neutral, blue/purple alkali. Litmus: red in acid, blue in alkali.
- Neutralisation word equation: acid + base → salt + water. Always this pattern.
- Example: hydrochloric acid + sodium hydroxide → sodium chloride + water.
- Salt names: hydrochloric acid → chloride salts. Sulfuric acid → sulfate salts. Nitric acid → nitrate salts.
- Real life: indigestion (stomach acid) treated with antacid (alkali). Farmers add lime to acidic soil.
- Evidence for chemical reaction: colour change, bubbles of gas, temperature change, precipitate forming, change in mass.`},
  energy:{name:"Energy",context:`Year 7 Science exam checklist skills to test:
- Energy stores (ALL 8): chemical, thermal, kinetic, gravitational potential (GPE), elastic potential, nuclear, magnetic, electrostatic.
- Energy transfers (ALL 4): mechanical/by force, electrical, by radiation (light/waves), by heating.
- Law of conservation of energy: energy CANNOT be created or destroyed, only transferred between stores.
- Efficiency = (Useful Output Energy ÷ Total Input Energy) × 100. Answer is a percentage.
- Example: bulb uses 100J, gives 10J light + 90J heat wasted. Efficiency = (10÷100)×100 = 10%.
- GPE = mass (kg) × g × height (m). On Earth g = 10 N/kg.
- Example: 5kg object raised 3m: GPE = 5×10×3 = 150J.
- GPE converts to KE as object falls. At top = max GPE, zero KE. At bottom = zero GPE, max KE.
- Wasted energy dissipates as thermal energy into surroundings.`},
  lightsound:{name:"Light & Sound",context:`Year 7 Science exam checklist skills to test:
- How we see: light reflects off objects into our eyes. We see reflected colours. Absorbed colours are not seen. Red object = reflects red, absorbs all other colours.
- Visible spectrum in order (ROY G BIV): Red, Orange, Yellow, Green, Blue, Indigo, Violet. Red = longest wavelength. Violet = shortest.
- Primary colours of LIGHT (not paint): red, green, blue.
- Law of reflection: angle of incidence = angle of reflection. Both measured from the NORMAL line.
- Practical to prove reflection: shine ray at mirror, mark incident and reflected rays, measure angles from normal — they are equal.
- How sound travels: vibrating object makes particles vibrate. Vibration passes through particles as compression waves. Sound CANNOT travel through vacuum — needs a medium.
- How we hear: sound enters ear canal → vibrates eardrum → 3 tiny bones amplify → cochlea converts to electrical signal → auditory nerve → brain.
- Loudness = amplitude. Pitch = frequency (Hz). Higher frequency = higher pitch. Larger amplitude = louder.
- Sound travels faster in solids than liquids than gases.`}
};
let currentTopic=null,questions=[],currentQ=0,score=0,answered=false,recentResults=[];
function goHome(){document.getElementById('topic-screen').style.display='block';document.getElementById('game-screen').style.display='none';document.getElementById('end-screen').style.display='none';}
async function startGame(k){currentTopic=k;questions=[];currentQ=0;score=0;answered=false;recentResults=[];document.getElementById('topic-screen').style.display='none';document.getElementById('end-screen').style.display='none';document.getElementById('game-screen').style.display='block';document.getElementById('game-title').textContent=TOPICS[k].name;updateScoreBadge();updateStreakDots();updateQNumber();await loadQuestion();}
function updateScoreBadge(){document.getElementById('score-badge').textContent=`${score} / ${currentQ}`;}
function updateQNumber(){document.getElementById('q-number').textContent=`Question ${currentQ+1}`;}
function updateStreakDots(){const c=document.getElementById('streak-dots');c.innerHTML='';const s=recentResults.slice(-10);for(let i=0;i<10;i++){const d=document.createElement('div');d.className='streak-dot';if(i<s.length){if(s[i])d.classList.add('hit');else d.classList.add('miss');}c.appendChild(d);}}
async function loadQuestion(){
  answered=false;['feedback-box','error-box'].forEach(id=>document.getElementById(id).style.display='none');document.getElementById('next-btn').style.display='none';document.getElementById('options-grid').innerHTML='';document.getElementById('q-box').innerHTML='<div class="loading-dots"><span></span><span></span><span></span></div>';
  const t=TOPICS[currentTopic];const prev=questions.slice(-20).map(q=>q.question).join(' | ');
  const prompt=`You are a quiz master helping 11-year-old Bert (dyslexic) revise for his Year 7 Science exam. Keep questions and answers SHORT and CLEAR. Vary between easy and harder questions.\n\nExact exam checklist content:\n${t.context}\n\n${prev?`Do NOT repeat: ${prev}`:''}\n\nGenerate ONE multiple choice question testing one checklist skill. Rules:\n- Question max 15 words\n- 4 options max 8 words each\n- 1 correct, wrong answers are common mistakes\n- 1-sentence explanation max 20 words\n\nJSON only: {"question":"...","options":["...","...","...","..."],"correct":0,"explanation":"..."}`;
  try{const r=await fetch('https://bert-api-proxy.super-night-6aa0.workers.dev',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:prompt}]})});if(!r.ok)throw 0;const d=await r.json();const q=JSON.parse(d.content[0].text.trim().replace(/```json|```/g,''));questions.push(q);renderQuestion(q);}
  catch(e){document.getElementById('q-box').innerHTML='<span class="q-text">Couldn\'t load — tap Next.</span>';document.getElementById('error-box').style.display='block';document.getElementById('next-btn').style.display='block';}
}
function renderQuestion(q){document.getElementById('q-box').innerHTML=`<span class="q-text">${q.question}</span>`;const g=document.getElementById('options-grid');g.innerHTML='';['A','B','C','D'].forEach((l,i)=>{const b=document.createElement('button');b.className='option-btn';b.innerHTML=`<span class="opt-letter">${l}</span><span>${q.options[i]}</span>`;b.onclick=()=>answer(i,q);g.appendChild(b);});}
function answer(chosen,q){if(answered)return;answered=true;const btns=document.getElementById('options-grid').querySelectorAll('.option-btn');const c=q.correct;const ok=chosen===c;if(ok)score++;recentResults.push(ok);btns.forEach((b,i)=>{b.disabled=true;if(i===c)b.classList.add('correct');else if(i===chosen&&!ok)b.classList.add('wrong');});const fb=document.getElementById('feedback-box');fb.className='feedback-box '+(ok?'correct':'wrong');fb.style.display='block';fb.innerHTML=ok?`<span class="feedback-emoji">🎉</span><strong>Correct!</strong><div class="feedback-explain">${q.explanation}</div>`:`<span class="feedback-emoji">😬</span><strong>Not quite — answer was ${'ABCD'[c]}: ${q.options[c]}</strong><div class="feedback-explain">${q.explanation}</div>`;updateScoreBadge();updateStreakDots();document.getElementById('next-btn').style.display='block';}
async function nextQuestion(){currentQ++;updateQNumber();await loadQuestion();}
function showEnd(){document.getElementById('game-screen').style.display='none';document.getElementById('end-screen').style.display='block';const tot=currentQ;const pct=tot>0?score/tot:0;let e,ti,m,s;if(pct>=0.9){e='🏆';ti='Outstanding!';s='⭐⭐⭐';m=`${score}/${tot} — Science is looking great!`;}else if(pct>=0.75){e='🎉';ti='Brilliant!';s='⭐⭐⭐';m=`${score}/${tot}. Really strong — review the misses.`;}else if(pct>=0.6){e='💪';ti='Good effort!';s='⭐⭐';m=`${score}/${tot}. Solid — another round will sharpen you up.`;}else{e='📚';ti='Keep going!';s='⭐';m=`${score}/${tot}. Keep practising — you'll get there!`;}document.getElementById('end-emoji').textContent=e;document.getElementById('end-title').textContent=ti;document.getElementById('end-stars').textContent=s;document.getElementById('final-score').textContent=score;document.getElementById('final-total').textContent=tot;document.getElementById('end-msg').textContent=m;}
function retryGame(){startGame(currentTopic);}
</script>
</body>
</html>
